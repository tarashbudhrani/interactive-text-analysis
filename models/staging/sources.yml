version: 2

sources:
  - name: raw_bls
    schema: raw_bls
    description: "BLS Producer Price Index data loaded by ingest/bls_ingest.py"
    tables:
      - name: ppi_series
        description: "Monthly PPI values for Grocery (WPU0223), Apparel (WPU0381), Electronics (WPU117)"
        columns:
          - name: series_id
          - name: period
            description: "YYYY-MM"
          - name: ppi_value
          - name: loaded_at

  - name: raw_census
    schema: raw_census
    description: "US Census MARTS retail sales data loaded by ingest/census_ingest.py"
    tables:
      - name: retail_sales
        columns:
          - name: period
          - name: naics_code
          - name: naics_label
          - name: sales_millions
          - name: loaded_at
