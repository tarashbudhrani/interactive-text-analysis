version: 2

models:
  - name: mart_stock_position
    description: "Current DSI, stock segment, and projected stockout date per SKU per location"
    columns:
      - name: variation_id
        tests: [not_null]
      - name: quantity_on_hand
        tests: [not_null]
      - name: dsi
      - name: stock_segment
        tests:
          - accepted_values:
              values: ['CRITICAL', 'LEAN', 'HEALTHY', 'OVERSTOCKED']

  - name: mart_reorder_signal
    description: "CRITICAL and LEAN SKUs with reorder quantity, urgency, and estimated cost"
    columns:
      - name: variation_id
        tests: [not_null]
      - name: reorder_quantity
        tests: [not_null]
      - name: reorder_urgency
        tests:
          - not_null
          - accepted_values:
              values: ['ORDER TODAY', 'ORDER THIS WEEK', 'PLAN REORDER']
      - name: estimated_reorder_cost
        tests: [not_null]

  - name: mart_pipeline_metadata
    description: "Last loaded_at timestamp and freshness status per source table"
    columns:
      - name: source_table
        tests: [not_null, unique]
      - name: last_loaded_at
      - name: freshness_status
        tests:
          - not_null
          - accepted_values:
              values: ['FRESH', 'STALE', 'VERY_STALE']
