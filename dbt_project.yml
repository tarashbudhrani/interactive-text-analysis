name: supply_chain
version: '1.0.0'
config-version: 2

profile: supply_chain

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  supply_chain:
    staging:
      +materialized: view
      stg_bls__ppi:
        +enabled: false
      stg_census__retail_sales:
        +enabled: false
    intermediate:
      +materialized: view
    marts:
      +materialized: table
      mart_cost_pressure:
        +enabled: false
